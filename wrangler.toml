name = "awesome-apptly"
main = ".output/server/index.mjs"
compatibility_date = "2026-03-24"
compatibility_flags = ["nodejs_compat"]

[build]
command = "pnpm build"

[dev]
ip = "0.0.0.0"

[assets]
directory = ".output/public"
binding = "ASSETS"

# wrangler d1 create awesome-apptly-content
[[d1_databases]]
binding = "DB"
database_name = "awesome-apptly-content"
database_id = "ae43dbee-70c0-456b-98b5-2adf1fa078b1"
preview_database_id = "local"
